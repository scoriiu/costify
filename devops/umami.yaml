apiVersion: apps/v1
kind: Deployment
metadata:
  name: umami
  namespace: costify
spec:
  replicas: 1
  selector:
    matchLabels:
      app: umami
  template:
    metadata:
      labels:
        app: umami
    spec:
      containers:
        - name: umami
          image: ghcr.io/umami-software/umami:postgresql-latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: costify-secrets
                  key: UMAMI_DATABASE_URL
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: costify-secrets
                  key: SESSION_SECRET
            - name: CLIENT_IP_HEADER
              value: x-real-ip
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: umami
  namespace: costify
spec:
  selector:
    app: umami
  ports:
    - port: 3000
      targetPort: 3000
