apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: solomon.coriiu@nisindo.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: costify-ingress
  namespace: costify
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - costify.ro
        - www.costify.ro
      secretName: costify-tls
  rules:
    - host: costify.ro
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: costify
                port:
                  number: 80
    - host: www.costify.ro
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: costify
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: registry-ingress
  namespace: costify
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - registry.costify.ro
      secretName: registry-tls
  rules:
    - host: registry.costify.ro
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: registry
                port:
                  number: 5000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: umami-ingress
  namespace: costify
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - analytics.costify.ro
      secretName: umami-tls
  rules:
    - host: analytics.costify.ro
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: umami
                port:
                  number: 3000
