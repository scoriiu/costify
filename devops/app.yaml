apiVersion: apps/v1
kind: Deployment
metadata:
  name: costify
  namespace: costify
spec:
  replicas: 2
  selector:
    matchLabels:
      app: costify
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: costify
    spec:
      initContainers:
        - name: prisma-migrate
          image: registry.costify.ro/costify:latest
          imagePullPolicy: Always
          command: ["sh", "-c"]
          args:
            - |
              set -e
              echo "==> Running prisma db push..."
              npx prisma db push --skip-generate --schema ./prisma/schema.prisma
              echo "==> Seeding AccountCatalog..."
              node prisma/seed.mjs
              echo "==> Init complete"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: costify-secrets
                  key: DATABASE_URL
      containers:
        - name: costify
          image: registry.costify.ro/costify:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: costify-secrets
                  key: DATABASE_URL
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: costify-secrets
                  key: SESSION_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: costify-secrets
                  key: ANTHROPIC_API_KEY
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: costify-secrets
                  key: S3_ENDPOINT
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: costify-secrets
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: costify-secrets
                  key: S3_SECRET_ACCESS_KEY
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: costify-secrets
                  key: S3_BUCKET
            # XLSX parsing for large Saga exports (>15 MB files like
            # UpperHouse's 19 MB journal) explodes to 200+ MB of live heap
            # during workbook decompression + row parsing. Node's default
            # --max-old-space-size is ~1.4 GB on a 2 GB container, which
            # caused V8 OOM segfaults (exit 139) on real-world imports.
            # 3 GB heap inside a 4 GB pod gives us headroom until imports
            # are moved off the request path into a BullMQ job.
            - name: NODE_OPTIONS
              value: "--max-old-space-size=3072"
          resources:
            requests:
              memory: 2Gi
              cpu: 1000m
            limits:
              memory: 4Gi
              cpu: 3000m
          # Startup probe warms heavy paths (Prisma init, OMFP catalog)
          # before traffic arrives. Pod is NOT marked ready until this
          # 200s — eliminates the cold-pod spike that used to hit the
          # first user request after deploy. failureThreshold * period
          # = 30 * 2 = 60s max before k8s gives up.
          startupProbe:
            httpGet:
              path: /api/warmup
              port: 3000
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/warmup
              port: 3000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: costify
  namespace: costify
spec:
  selector:
    app: costify
  ports:
    - port: 80
      targetPort: 3000
